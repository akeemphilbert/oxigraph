name: Go binding

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next
    tags:
      # Go's module proxy resolves versions of the go/ subdirectory
      # module from tags with the go/ prefix (go/vX.Y.Z).
      - go/v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    strategy:
      fail-fast: false # one OS's registry flake must not cancel the others
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: macos-latest
          # Go's cgo links with MinGW, so Windows builds the GNU target,
          # never MSVC.
          - runner: windows-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
      - run: cargo build -p oxigraph-ffi --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: test -z "$(gofmt -l .)"
        working-directory: ./go
      - run: go vet ./...
        working-directory: ./go
      - run: go test ./...
        working-directory: ./go

  ffi_artifact:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: ubuntu-latest
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
          - platform: darwin_arm64
            runner: macos-latest
            deployment_target: '11.0'
          - platform: darwin_amd64
            runner: macos-latest
            target: x86_64-apple-darwin
            deployment_target: '10.14'
          - platform: windows_amd64
            runner: windows-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
      - run: cargo build -p oxigraph-ffi --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - run: mkdir -p artifact && cp target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/liboxigraph_ffi.a artifact/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: liboxigraph-ffi-${{ matrix.platform }}
          path: artifact/liboxigraph_ffi.a

  # Proves the story #17 acceptance criterion: a Go consumer builds with
  # nothing but Go and a C toolchain — the Rust toolchain is removed
  # from the runner before the build.
  consumer_no_rust:
    needs: ffi_artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: liboxigraph-ffi-linux_amd64
          path: go/lib/linux_amd64
      - run: rustup self uninstall -y || sudo rm -rf "$HOME/.cargo" "$HOME/.rustup"
      - run: if command -v cargo || command -v rustc; then echo "Rust is still installed" && exit 1; fi
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: go build -o quickstart ./examples/quickstart
        working-directory: ./go
      - run: ./go/quickstart

  # Pushing a go/vX.Y.Z tag publishes a GitHub release with the five
  # static libraries attached. They ship as release assets rather than
  # committed into the tag because GitHub rejects files over 100 MB and
  # the libraries are already 73-97 MB each.
  release:
    if: startsWith(github.ref, 'refs/tags/go/v')
    needs:
      - test
      - ffi_artifact
      - consumer_no_rust
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: liboxigraph-ffi-*
          path: dist
      - run: |
          mkdir assets
          for dir in dist/liboxigraph-ffi-*; do
            platform="${dir##*liboxigraph-ffi-}"
            gzip -9 -c "$dir/liboxigraph_ffi.a" > "assets/liboxigraph_ffi_${platform}.a.gz"
          done
          test "$(ls assets/liboxigraph_ffi_*.a.gz | wc -l)" -eq 5
          (cd assets && sha256sum liboxigraph_ffi_*.a.gz > SHA256SUMS)
      # A semver prerelease version (go/v0.1.0-alpha.1, -beta.2, -rc.1,
      # ...) becomes a GitHub prerelease.
      - run: |
          version="${GITHUB_REF_NAME#go/}"
          prerelease=""
          case "$version" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" assets/* --verify-tag --title "Go binding $version" --generate-notes $prerelease
        env:
          GH_TOKEN: ${{ github.token }}
