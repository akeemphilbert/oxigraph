name: Go binding

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - run: cargo build -p oxigraph-ffi --release
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: test -z "$(gofmt -l .)"
        working-directory: ./go
      - run: go vet ./...
        working-directory: ./go
      - run: go test ./...
        working-directory: ./go

  ffi_artifact:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: ubuntu-latest
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
          - platform: darwin_arm64
            runner: macos-latest
            deployment_target: '11.0'
          - platform: darwin_amd64
            runner: macos-latest
            target: x86_64-apple-darwin
            deployment_target: '10.14'
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
      - run: cargo build -p oxigraph-ffi --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - run: mkdir -p artifact && cp target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/liboxigraph_ffi.a artifact/
      - uses: actions/upload-artifact@v4
        with:
          name: liboxigraph-ffi-${{ matrix.platform }}
          path: artifact/liboxigraph_ffi.a

  # Proves the story #17 acceptance criterion: a Go consumer builds with
  # nothing but Go and a C toolchain — the Rust toolchain is removed
  # from the runner before the build.
  consumer_no_rust:
    needs: ffi_artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: liboxigraph-ffi-linux_amd64
          path: go/lib/linux_amd64
      - run: rustup self uninstall -y || sudo rm -rf "$HOME/.cargo" "$HOME/.rustup"
      - run: if command -v cargo || command -v rustc; then echo "Rust is still installed" && exit 1; fi
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: go build -o quickstart ./examples/quickstart
        working-directory: ./go
      - run: ./go/quickstart
